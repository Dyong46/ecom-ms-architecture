global
    log stdout format raw local0
    maxconn 200

defaults
    log global
    mode tcp
    option tcplog
    retries 3
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    timeout check    5s

# ─────────────────────────────────────────────
# Stats dashboard  →  http://localhost:7000/stats
# ─────────────────────────────────────────────
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node

# ─────────────────────────────────────────────
# WRITE port (5000)
# Routes exclusively to the current Patroni primary.
# HAProxy calls GET /primary on each node's REST API (port 8008).
# Only the leader returns HTTP 200; others return 503.
# ─────────────────────────────────────────────
frontend pg_write_frontend
    bind *:5000
    default_backend pg_write_backend

backend pg_write_backend
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions init-addr last,libc,none
    server pg1 pg1:5432 check port 8008
    server pg2 pg2:5432 check port 8008
    server pg3 pg3:5432 check port 8008

# ─────────────────────────────────────────────
# READ port (5001)
# Load-balances across healthy replica nodes.
# HAProxy calls GET /replica; replicas return 200, primary returns 503.
# Falls back to the primary (marked 'backup') only if all replicas are down.
# ─────────────────────────────────────────────
frontend pg_read_frontend
    bind *:5001
    default_backend pg_read_backend

backend pg_read_backend
    option httpchk GET /replica
    http-check expect status 200
    balance roundrobin
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions init-addr last,libc,none
    server pg1 pg1:5432 check port 8008 backup
    server pg2 pg2:5432 check port 8008
    server pg3 pg3:5432 check port 8008
