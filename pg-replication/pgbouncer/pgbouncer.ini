[databases]
# Route all databases through HAProxy write port (primary)
* = host=haproxy port=5000

[pgbouncer]
listen_port = 5432
listen_addr = *

# Authentication – md5 hashes in userlist.txt
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Pooling mode: transaction is most efficient for connection reuse
pool_mode = transaction

# Connection limits
max_client_conn = 200
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

# Server behaviour
server_idle_timeout = 600
client_idle_timeout = 0

# Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

# Admin access
admin_users = postgres
stats_users = postgres

# Ignore startup parameters sent by certain clients (e.g. JDBC)
ignore_startup_parameters = extra_float_digits,search_path
