[databases]
# Route all databases through HAProxy writer endpoint (port 5000 → Patroni primary)
# DB name wildcard: PgBouncer forwards any DB name to HAProxy, which routes to primary
* = host=ha_haproxy port=5000

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

# Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Pool mode: transaction is recommended for microservices
# NOTE: transaction mode does not support server-side prepared statements.
# Spring Boot JDBC URL must include prepareThreshold=0 when using this mode.
pool_mode = transaction

# Connection limits
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

# Maximum real connections to the backend PostgreSQL (across all pools)
max_db_connections = 50

# Logging (set to 1 to debug connections in development)
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

# Required when using transaction mode: resets server state between transactions
server_reset_query = DISCARD ALL

# Ignore extra_float_digits sent by JDBC driver (avoids parameter mismatch errors)
ignore_startup_parameters = extra_float_digits

# Keepalive settings
server_idle_timeout = 600
client_idle_timeout = 0
