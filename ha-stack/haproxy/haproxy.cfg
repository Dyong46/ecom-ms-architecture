global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp
    retries 3
    timeout connect 5s
    timeout client 30m
    timeout server 30m
    timeout check 5s

#------------------------------------------------------------
# HAProxy Stats Dashboard  →  http://localhost:7000/stats
#------------------------------------------------------------
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node

#------------------------------------------------------------
# Writer endpoint (port 5000) — routes ONLY to Patroni primary
# Health check: Patroni REST API GET /master → HTTP 200 when primary
#------------------------------------------------------------
listen postgres_write
    bind *:5000
    option httpchk GET /master
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-node1 ha_pg_node1:5432 check port 8008
    server pg-node2 ha_pg_node2:5432 check port 8008
    server pg-node3 ha_pg_node3:5432 check port 8008

#------------------------------------------------------------
# Reader endpoint (port 5001) — routes to Patroni replicas
# Health check: Patroni REST API GET /replica → HTTP 200 when replica
# Falls back to primary if no replica is available (backup keyword)
#------------------------------------------------------------
listen postgres_read
    bind *:5001
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-node1 ha_pg_node1:5432 check port 8008 backup
    server pg-node2 ha_pg_node2:5432 check port 8008
    server pg-node3 ha_pg_node3:5432 check port 8008
